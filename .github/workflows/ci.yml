name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: cargo check + fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: cargo test (ignored)
        run: cargo test --workspace -- --ignored
        continue-on-error: true

  cross-platform-build:
    name: build / ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: macos-14,       triple: aarch64-apple-darwin }
          - { os: macos-13,       triple: x86_64-apple-darwin }
          - { os: ubuntu-latest,  triple: x86_64-unknown-linux-gnu }
          - { os: windows-latest, triple: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.triple }}

      - uses: Swatinem/rust-cache@v2

      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target.triple }}

  npm-validate:
    name: npm publish --dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - working-directory: npm
        run: npm publish --dry-run --access public

  pypi-validate:
    name: pypi build + twine check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
      - working-directory: pypi
        run: |
          uvx --from build pyproject-build --wheel --sdist
          uvx twine check dist/*
