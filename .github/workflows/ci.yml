name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  # Cancel superseded PR runs; never cancel main pushes (group key is unique
  # per ref on main, per PR number on PRs).
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      npm: ${{ steps.filter.outputs.npm }}
      pypi: ${{ steps.filter.outputs.pypi }}
      ci: ${{ steps.filter.outputs.ci }}
      surfaces: ${{ steps.filter.outputs.surfaces }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          # On `push`, paths-filter compares to the previous commit on the
          # branch. On PRs it compares to the base ref. Either way, treat
          # CI/Greptile config changes as "everything changed" to retest
          # pipeline edits.
          filters: |
            rust:
              - 'klasp/**'
              - 'klasp-core/**'
              - 'klasp-agents-*/**'
              - 'examples/klasp-plugin-*/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain*'
            npm:
              - 'npm/**'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - '.npmrc'
            pypi:
              - 'pypi/**'
            ci:
              - '.github/workflows/**'
              - 'greptile.json'
            surfaces:
              # Inputs to the agent-surfaces guards: surface crates (a new one
              # must add a row), the matrix source of truth + rendered file, the
              # proof test files, and the guard/generator scripts.
              - 'klasp-agents-*/**'
              - 'klasp/tests/**'
              - 'docs/agent-surfaces.md'
              - 'docs/surfaces.json'
              - 'scripts/check-agent-surfaces.mjs'
              - 'scripts/gen-agent-surfaces.mjs'
              - 'scripts/verify-surface-proofs.mjs'

  check:
    name: cargo check + fmt + clippy + test
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: cargo test (ignored)
        run: cargo test --workspace -- --ignored
        continue-on-error: true

      # examples/ holds forkable reference plugins intentionally OUTSIDE the
      # workspace (Cargo.toml `exclude`), so the clippy/test steps above never
      # touch them — including the git-arg flag-smuggling security regression
      # test in klasp-plugin-agentic-flow
      # (gate_flag_smuggling_base_ref_is_rejected). Run each example crate
      # explicitly so those suites gate every PR. NOT continue-on-error: a
      # failure here must fail the build.
      - name: cargo clippy + test (example plugins)
        shell: bash
        run: |
          set -euo pipefail
          for manifest in examples/*/Cargo.toml; do
            echo "::group::$manifest"
            cargo clippy --manifest-path "$manifest" --all-targets -- -D warnings
            cargo test --manifest-path "$manifest"
            echo "::endgroup::"
          done

      # Insta snapshot guard. `cargo test` accepts matching snapshots but
      # leaves `*.snap.new` artefacts on drift. Fail the build if any are
      # present — forces an explicit `cargo insta accept` (or revert) in the
      # author's commit rather than silent acceptance on `main`.
      - name: verify no stray insta snapshots
        shell: bash
        run: |
          orphans=$(find . -name '*.snap.new' -not -path './target/*' -not -path './.claude/*' -print)
          if [ -n "$orphans" ]; then
            echo "::error::Uncommitted insta snapshot drift:"
            echo "$orphans"
            exit 1
          fi

  cross-platform-build:
    name: build / ${{ matrix.target.os }}
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: macos-14,         triple: aarch64-apple-darwin }
          - { os: ubuntu-latest,    triple: x86_64-unknown-linux-gnu }
          - { os: windows-latest,   triple: x86_64-pc-windows-msvc }
          - { os: ubuntu-24.04-arm, triple: aarch64-unknown-linux-gnu }
          # x86_64-apple-darwin intentionally absent from the v0.1 matrix.
          # See docs/roadmap.md "What v0.1 actually delivered" for rationale.
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target.triple }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target.triple }}

  npm-validate:
    name: npm publish --dry-run
    needs: changes
    if: ${{ needs.changes.outputs.npm == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6.4.0
        with:
          node-version: 20
      # Validate the main package only — per-platform sub-packages have their
      # binaries staged at release time (see .github/workflows/release.yml)
      # and would fail dry-run today because the binary file is gitignored.
      - working-directory: npm/klasp
        run: npm publish --dry-run --access public

  pypi-validate:
    name: pypi maturin build + twine check
    needs: changes
    # pypi wheel is built via maturin from the Rust source, so Rust changes
    # also trigger this job.
    if: ${{ needs.changes.outputs.pypi == 'true' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Use the same maturin-action as release.yml so CI exercises the identical
      # code path and catches any divergence before a tag is pushed.
      - name: build wheel via maturin-action
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          working-directory: pypi
          args: --release --out dist
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
      - name: twine check
        working-directory: pypi
        run: uvx twine check dist/*

  surfaces:
    name: agent-surfaces guard
    needs: changes
    if: ${{ needs.changes.outputs.surfaces == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6.4.0
        with:
          node-version: 20
      # Asserts every klasp-agents-* surface crate has a row in
      # docs/agent-surfaces.md. A new surface landing without a matrix row
      # fails here (issue #68 — the conformance matrix is a tracked contract).
      - name: check agent surfaces
        run: node scripts/check-agent-surfaces.mjs

      # The matrix tables are generated from docs/surfaces.json; fail if the
      # committed markdown has drifted from the source of truth.
      - name: matrix matches surfaces.json (no drift)
        run: node scripts/gen-agent-surfaces.mjs --check

      # Every ✓ cell must be backed by a proof test file that exists and holds
      # a runnable (non-#[ignore]) test. Combined with the cargo-test job, a ✓
      # cannot be committed without a real, runnable, passing test.
      - name: every check-mark is backed by a runnable test
        run: node scripts/verify-surface-proofs.mjs

  # ------------------------------------------------------------------
  # Aggregate required-check.
  #
  # Branch protection should require ONLY this job (plus `semantic-title`
  # from pr-title.yml and any Greptile check). All other jobs above are
  # consumed by this one, so internal job names can be added, renamed, or
  # sharded without re-touching branch-protection rules.
  #
  # Pattern: run always (`if: always()`), then explicitly accept `success`
  # and `skipped` as pass states. `skipped` is critical — it lets docs-only
  # PRs pass when path filters skip the Rust/npm/pypi jobs.
  # ------------------------------------------------------------------
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    needs:
      - changes
      - check
      - cross-platform-build
      - npm-validate
      - pypi-validate
      - surfaces
    if: always()
    steps:
      - name: verify required jobs
        shell: bash
        run: |
          set -euo pipefail
          declare -A results=(
            [changes]="${{ needs.changes.result }}"
            [check]="${{ needs.check.result }}"
            [cross-platform-build]="${{ needs.cross-platform-build.result }}"
            [npm-validate]="${{ needs.npm-validate.result }}"
            [pypi-validate]="${{ needs.pypi-validate.result }}"
            [surfaces]="${{ needs.surfaces.result }}"
          )
          fail=0
          for job in "${!results[@]}"; do
            r="${results[$job]}"
            case "$r" in
              success|skipped)
                echo "ok $job: $r"
                ;;
              *)
                echo "::error::$job: $r"
                fail=1
                ;;
            esac
          done
          exit $fail
