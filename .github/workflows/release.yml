name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # softprops/action-gh-release needs this to upload assets

jobs:
  # ---------------------------------------------------------------------------
  # 1. Derive version from the pushed tag (`v0.1.0` -> `0.1.0`) and surface it
  # to every downstream job as an output. The bump scripts in build-binaries,
  # publish-npm, publish-pypi, and publish-cargo all consume this same value
  # to keep manifests in lockstep with the tag.
  # ---------------------------------------------------------------------------
  prepare-version:
    name: prepare version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - name: derive version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing klasp $VERSION (tag: $GITHUB_REF_NAME)"

  # ---------------------------------------------------------------------------
  # 2. Build per-platform binaries.
  #
  # Native runners across the v0.1 matrix (design.md §9):
  #   - aarch64-apple-darwin       on macos-14
  #   - x86_64-unknown-linux-gnu   on ubuntu-latest
  #   - aarch64-unknown-linux-gnu  on ubuntu-24.04-arm (native; no cross container)
  #   - x86_64-pc-windows-msvc     on windows-latest
  #
  # x86_64-apple-darwin (macos-13) intentionally dropped: GitHub-hosted x86 mac
  # runners are materially slower / queue-prone, gating the whole release.
  # Apple Silicon dominates the macOS dev population in 2025+ and a v0.1 user
  # on x86 mac can `cargo install klasp` from source.
  #
  # Each job uploads the raw binary as a workflow artifact. Downstream jobs
  # download those artifacts and stage them into npm sub-packages and
  # maturin wheels.
  # ---------------------------------------------------------------------------
  build-binaries:
    name: build / ${{ matrix.target.triple }}
    needs: prepare-version
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: macos-14, triple: aarch64-apple-darwin, ext: "" }
          - { os: ubuntu-latest, triple: x86_64-unknown-linux-gnu, ext: "" }
          - { os: ubuntu-24.04-arm, triple: aarch64-unknown-linux-gnu, ext: "" }
          - { os: windows-latest, triple: x86_64-pc-windows-msvc, ext: ".exe" }
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target.triple }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target.triple }}

      - name: bump source versions
        shell: bash
        env:
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: node scripts/bump-source-versions.mjs "$VERSION"

      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target.triple }} --bin klasp

      - name: stage binary
        shell: bash
        run: |
          mkdir -p staging
          cp "target/${{ matrix.target.triple }}/release/klasp${{ matrix.target.ext }}" "staging/klasp${{ matrix.target.ext }}"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
        with:
          name: klasp-${{ matrix.target.triple }}
          path: staging/klasp${{ matrix.target.ext }}
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 3. Publish to npm.
  #
  # Order matters: per-platform sub-packages MUST publish first, otherwise
  # the main package's `optionalDependencies` resolve to nothing on installer
  # machines until the sub-packages catch up. We publish the main package
  # last for the same reason.
  # ---------------------------------------------------------------------------
  publish-npm:
    name: publish npm
    needs: [prepare-version, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: download all binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # actions/download-artifact@v4
        with:
          path: artifacts

      - name: stage per-platform binaries
        shell: bash
        run: |
          set -euo pipefail
          # Map: GitHub artifact name -> npm sub-package directory
          stage() {
            local artifact="$1" pkgdir="$2" filename="$3"
            local src="artifacts/${artifact}/${filename}"
            local dst="npm/${pkgdir}/${filename}"
            cp "$src" "$dst"
            chmod +x "$dst" || true
            cp LICENSE "npm/${pkgdir}/LICENSE"
          }
          stage klasp-aarch64-apple-darwin       darwin-arm64    klasp
          stage klasp-x86_64-unknown-linux-gnu   linux-x64-gnu   klasp
          stage klasp-aarch64-unknown-linux-gnu  linux-arm64-gnu klasp
          stage klasp-x86_64-pc-windows-msvc     win32-x64       klasp.exe

      - name: bump npm versions in lockstep
        shell: bash
        env:
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: node scripts/bump-npm-versions.mjs "$VERSION"

      - name: publish per-platform sub-packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          set -euo pipefail
          for pkg in darwin-arm64 linux-x64-gnu linux-arm64-gnu win32-x64; do
            full="@klasp-dev/klasp-$pkg"
            if [ "$(curl -sf -o /dev/null -w '%{http_code}' \
                "https://registry.npmjs.org/${full}/${VERSION}" || echo 000)" = "200" ]; then
              echo "${full}@${VERSION} already on npm; skipping publish."
              continue
            fi
            echo "::group::npm publish $full"
            (cd "npm/$pkg" && npm publish --access public --provenance)
            echo "::endgroup::"
          done

      - name: publish main package
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          # Published last so the optionalDependencies above are resolvable
          # the moment a user runs `npm install @klasp-dev/klasp`.
          if [ "$(curl -sf -o /dev/null -w '%{http_code}' \
              "https://registry.npmjs.org/@klasp-dev/klasp/${VERSION}" || echo 000)" = "200" ]; then
            echo "@klasp-dev/klasp@${VERSION} already on npm; skipping publish."
            exit 0
          fi
          (cd npm/klasp && npm publish --access public --provenance)

  # ---------------------------------------------------------------------------
  # 4. Publish to PyPI.
  #
  # We rebuild wheels via maturin per target rather than reusing the binaries
  # from build-binaries — maturin needs to wrap them in a properly-tagged wheel.
  # The fastest path is `maturin-action` which knows how to set up Rust, target
  # toolchains, and (for linux) a manylinux container.
  #
  # Trusted publishing (OIDC) is preferred. Falls back to PYPI_TOKEN if the
  # repo isn't yet registered as a trusted publisher on pypi.org.
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: publish pypi / ${{ matrix.target.triple }}
    needs: [prepare-version, build-binaries]
    strategy:
      fail-fast: false
      matrix:
        target:
          # `manylinux` is only meaningful on Linux targets; the action ignores
          # it elsewhere. We set "2014" on Linux to produce wheels with the
          # widest glibc compatibility, and "auto" on non-Linux as a no-op
          # placeholder so the matrix entries stay shape-compatible.
          - { os: macos-14, triple: aarch64-apple-darwin, manylinux: "auto" }
          - { os: ubuntu-latest, triple: x86_64-unknown-linux-gnu, manylinux: "2014" }
          - { os: ubuntu-24.04-arm, triple: aarch64-unknown-linux-gnu, manylinux: "2014" }
          - { os: windows-latest, triple: x86_64-pc-windows-msvc, manylinux: "auto" }
    runs-on: ${{ matrix.target.os }}
    permissions:
      contents: read
      id-token: write # for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: 20

      - name: bump source versions
        shell: bash
        env:
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: node scripts/bump-source-versions.mjs "$VERSION"

      - name: build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          working-directory: pypi
          target: ${{ matrix.target.triple }}
          manylinux: ${{ matrix.target.manylinux }}
          args: --release --out dist
          # Sccache speeds up repeated builds across the matrix.
          sccache: "true"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
        with:
          name: pypi-wheel-${{ matrix.target.triple }}
          path: pypi/dist/*.whl
          if-no-files-found: error
          retention-days: 7

  publish-pypi-collect:
    name: publish pypi (upload)
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    # `secrets` context cannot be used directly in step-level `if:` expressions
    # (rejected by GitHub's workflow validator). Hoist the existence check into
    # a job-level env var so the per-step `if:` can read `env.HAS_PYPI_TOKEN`.
    env:
      HAS_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN != '' }}
    steps:
      - name: collect wheels
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # actions/download-artifact@v4
        with:
          pattern: pypi-wheel-*
          path: dist
          merge-multiple: true

      - name: list wheels
        run: ls -la dist/

      - name: report auth method
        shell: bash
        run: |
          if [ "$HAS_PYPI_TOKEN" = "true" ]; then
            echo "PyPI auth: using PYPI_TOKEN secret (API token)"
          else
            echo "PyPI auth: using OIDC trusted publisher (no PYPI_TOKEN set)"
          fi

      - name: publish to PyPI via OIDC (trusted publisher)
        if: env.HAS_PYPI_TOKEN == 'false'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
          skip-existing: true

      - name: publish to PyPI via API token
        if: env.HAS_PYPI_TOKEN == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true

  # ---------------------------------------------------------------------------
  # 5. Publish to crates.io.
  #
  # cargo publish builds from source on the registry side, so it doesn't need
  # the per-platform binaries. We still gate on `build-binaries` so a tag that
  # cannot produce a single binary doesn't pollute crates.io with a release
  # the other channels skipped.
  #
  # Order: klasp-core -> klasp-agents-claude -> klasp-agents-codex -> klasp-agents-aider -> klasp.
  # Each upstream crate must be live on crates.io before the downstream
  # `cargo publish` accepts its dependency.
  #
  # Each publish step is idempotent: if the version is already live on
  # crates.io (e.g. a prior partial-success run published klasp-core but
  # the workflow failed downstream and is being retried) the publish is
  # skipped instead of erroring with `crate version already exists`.
  # ---------------------------------------------------------------------------
  publish-cargo:
    name: publish cargo
    needs: [prepare-version, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: 20

      - name: bump source versions
        shell: bash
        env:
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: node scripts/bump-source-versions.mjs "$VERSION"

      - name: publish klasp-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          set -euo pipefail
          crate="klasp-core"
          if [ "$(curl -sf -o /dev/null -w '%{http_code}' \
              -H 'User-Agent: klasp-release-workflow' \
              "https://crates.io/api/v1/crates/${crate}/${VERSION}" || echo 000)" = "200" ]; then
            echo "${crate} ${VERSION} already on crates.io; skipping publish."
            exit 0
          fi
          cargo publish -p "${crate}" --no-verify --allow-dirty

      - name: wait for klasp-core to land
        env:
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          set -euo pipefail
          crate="klasp-core"
          url="https://crates.io/api/v1/crates/${crate}/${VERSION}"
          echo "Polling ${url} ..."
          for i in $(seq 1 36); do
            status=$(curl -sf -o /dev/null -w "%{http_code}" \
              -H "User-Agent: klasp-release-workflow" "$url" || echo "000")
            if [ "$status" = "200" ]; then
              echo "${crate} ${VERSION} is live on crates.io (attempt ${i})."
              exit 0
            fi
            echo "  attempt ${i}/36: got HTTP ${status}; retrying in 5s ..."
            sleep 5
          done
          echo "ERROR: ${crate} ${VERSION} did not appear on crates.io within 180s." >&2
          exit 1

      - name: publish klasp-agents-claude
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          set -euo pipefail
          crate="klasp-agents-claude"
          if [ "$(curl -sf -o /dev/null -w '%{http_code}' \
              -H 'User-Agent: klasp-release-workflow' \
              "https://crates.io/api/v1/crates/${crate}/${VERSION}" || echo 000)" = "200" ]; then
            echo "${crate} ${VERSION} already on crates.io; skipping publish."
            exit 0
          fi
          cargo publish -p "${crate}" --no-verify --allow-dirty

      - name: wait for klasp-agents-claude to land
        env:
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          set -euo pipefail
          crate="klasp-agents-claude"
          url="https://crates.io/api/v1/crates/${crate}/${VERSION}"
          echo "Polling ${url} ..."
          for i in $(seq 1 36); do
            status=$(curl -sf -o /dev/null -w "%{http_code}" \
              -H "User-Agent: klasp-release-workflow" "$url" || echo "000")
            if [ "$status" = "200" ]; then
              echo "${crate} ${VERSION} is live on crates.io (attempt ${i})."
              exit 0
            fi
            echo "  attempt ${i}/36: got HTTP ${status}; retrying in 5s ..."
            sleep 5
          done
          echo "ERROR: ${crate} ${VERSION} did not appear on crates.io within 180s." >&2
          exit 1

      - name: publish klasp-agents-codex
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          set -euo pipefail
          crate="klasp-agents-codex"
          if [ "$(curl -sf -o /dev/null -w '%{http_code}' \
              -H 'User-Agent: klasp-release-workflow' \
              "https://crates.io/api/v1/crates/${crate}/${VERSION}" || echo 000)" = "200" ]; then
            echo "${crate} ${VERSION} already on crates.io; skipping publish."
            exit 0
          fi
          cargo publish -p "${crate}" --no-verify --allow-dirty

      - name: wait for klasp-agents-codex to land
        env:
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          set -euo pipefail
          crate="klasp-agents-codex"
          url="https://crates.io/api/v1/crates/${crate}/${VERSION}"
          echo "Polling ${url} ..."
          for i in $(seq 1 36); do
            status=$(curl -sf -o /dev/null -w "%{http_code}" \
              -H "User-Agent: klasp-release-workflow" "$url" || echo "000")
            if [ "$status" = "200" ]; then
              echo "${crate} ${VERSION} is live on crates.io (attempt ${i})."
              exit 0
            fi
            echo "  attempt ${i}/36: got HTTP ${status}; retrying in 5s ..."
            sleep 5
          done
          echo "ERROR: ${crate} ${VERSION} did not appear on crates.io within 180s." >&2
          exit 1

      - name: publish klasp-agents-aider
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          set -euo pipefail
          crate="klasp-agents-aider"
          if [ "$(curl -sf -o /dev/null -w '%{http_code}' \
              -H 'User-Agent: klasp-release-workflow' \
              "https://crates.io/api/v1/crates/${crate}/${VERSION}" || echo 000)" = "200" ]; then
            echo "${crate} ${VERSION} already on crates.io; skipping publish."
            exit 0
          fi
          cargo publish -p "${crate}" --no-verify --allow-dirty

      - name: wait for klasp-agents-aider to land
        env:
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          set -euo pipefail
          crate="klasp-agents-aider"
          url="https://crates.io/api/v1/crates/${crate}/${VERSION}"
          echo "Polling ${url} ..."
          for i in $(seq 1 36); do
            status=$(curl -sf -o /dev/null -w "%{http_code}" \
              -H "User-Agent: klasp-release-workflow" "$url" || echo "000")
            if [ "$status" = "200" ]; then
              echo "${crate} ${VERSION} is live on crates.io (attempt ${i})."
              exit 0
            fi
            echo "  attempt ${i}/36: got HTTP ${status}; retrying in 5s ..."
            sleep 5
          done
          echo "ERROR: ${crate} ${VERSION} did not appear on crates.io within 180s." >&2
          exit 1

      - name: publish klasp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          set -euo pipefail
          crate="klasp"
          if [ "$(curl -sf -o /dev/null -w '%{http_code}' \
              -H 'User-Agent: klasp-release-workflow' \
              "https://crates.io/api/v1/crates/${crate}/${VERSION}" || echo 000)" = "200" ]; then
            echo "${crate} ${VERSION} already on crates.io; skipping publish."
            exit 0
          fi
          cargo publish -p "${crate}" --no-verify --allow-dirty

  # ---------------------------------------------------------------------------
  # 6. GitHub Release.
  #
  # Attach the per-platform binaries (tarballs for unix, zip for windows) so
  # users without npm / pip / cargo can grab a binary directly.
  # ---------------------------------------------------------------------------
  github-release:
    name: github release
    needs: [publish-npm, publish-pypi-collect, publish-cargo]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - name: download all binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # actions/download-artifact@v4
        with:
          pattern: klasp-*
          path: artifacts
          merge-multiple: false

      - name: package binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          for triple_dir in artifacts/klasp-*/; do
            triple="$(basename "$triple_dir" | sed 's/^klasp-//')"
            archive_name="klasp-${GITHUB_REF_NAME}-${triple}"
            if [[ "$triple" == *windows* ]]; then
              (cd "$triple_dir" && zip -j "../../release-assets/${archive_name}.zip" klasp.exe)
            else
              chmod +x "${triple_dir}klasp"
              tar -C "$triple_dir" -czf "release-assets/${archive_name}.tar.gz" klasp
            fi
          done
          ls -la release-assets/

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
