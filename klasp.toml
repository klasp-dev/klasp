# klasp.toml — klasp's own dogfood config (canonical v0.1 reference example)
# Docs: https://github.com/klasp-dev/klasp
# Verify this install:  klasp doctor
#
# Patterns illustrated below:
#   - commit triggers run on every agent-attempted `git commit` (fast feedback)
#   - push triggers run on every `git push` (slower checks the agent sees later)
#   - ${KLASP_BASE_REF} is set by the gate to the merge-base of HEAD against the
#     remote tracking branch; use it to scope checks to the diff (cuts wall time
#     dramatically on large repos). Not used here because cargo's incremental
#     build already scopes work to changed crates.
#
# Recipes for other ecosystems (pre-commit, fallow, pytest, eslint/biome, ruff)
# live in docs/recipes.md.

version = 1

[gate]
# Agent surfaces that klasp intercepts. v0.1 supports "claude_code"; Codex
# arrives in v0.2. See docs/roadmap.md.
agents = ["claude_code"]
# "any_fail" blocks the agent if any check returns Fail. Only policy in v0.1.
policy = "any_fail"

# ---------------------------------------------------------------------------
# Fast type/borrow check on every commit attempt. cargo check is the cheapest
# way to catch a broken build before it reaches the agent's commit message.
# Runs in well under a second on a warm target/ — appropriate for the commit
# trigger.
# ---------------------------------------------------------------------------
[[checks]]
name = "cargo-check"
triggers = [{ on = ["commit", "push"] }]
timeout_secs = 60
[checks.source]
type = "shell"
command = "cargo check --all-targets --workspace"

# ---------------------------------------------------------------------------
# Lint with -D warnings on commit and push. clippy is slower than cargo check
# but still tractable on every commit because the workspace is small. The
# launch-demo workflow (block on a clippy fail, agent re-attempts after fix)
# relies on this check living on the commit trigger.
# ---------------------------------------------------------------------------
[[checks]]
name = "cargo-clippy"
triggers = [{ on = ["commit", "push"] }]
timeout_secs = 180
[checks.source]
type = "shell"
command = "cargo clippy --all-targets --workspace -- -D warnings"

# ---------------------------------------------------------------------------
# Full workspace tests on push only. Tests are far slower than clippy and the
# agent will already have seen cargo check + clippy verdicts at commit time;
# blocking on push is the right place to catch test regressions before they
# reach the remote.
# ---------------------------------------------------------------------------
[[checks]]
name = "cargo-test"
triggers = [{ on = ["push"] }]
timeout_secs = 300
[checks.source]
type = "shell"
command = "cargo test --workspace"

# ---------------------------------------------------------------------------
# Named recipe entries — dogfood mode (issue #33 item 2).
#
# These entries exercise the four built-in named recipes on klasp's own repo.
# No verdict_path is configured on any entry; klasp auto-emits verdicts to
# the default location. Triggers are scoped so each recipe only fires when
# the relevant toolchain is meaningful:
#
#   pre_commit  — commit trigger; runs the repo's .pre-commit-config.yaml hooks.
#   fallow      — commit trigger; audits JS/TS drift against the diff base.
#   pytest      — push trigger;  exercises the Python layer (pypi/ shim).
#   cargo       — push trigger;  mirrors cargo-check above via the named recipe.
#
# The push-only triggers for pytest and cargo mean the named recipes don't
# double-fire alongside the shell-based checks on every commit; the shell
# checks already cover the commit path.
# ---------------------------------------------------------------------------
[[checks]]
name = "pre_commit"
triggers = [{ on = ["commit"] }]
timeout_secs = 60
[checks.source]
type = "pre_commit"

[[checks]]
name = "fallow"
triggers = [{ on = ["commit"] }]
timeout_secs = 60
[checks.source]
type = "fallow"

[[checks]]
name = "pytest"
triggers = [{ on = ["push"] }]
timeout_secs = 120
[checks.source]
type = "pytest"

[[checks]]
name = "cargo"
triggers = [{ on = ["push"] }]
timeout_secs = 300
[checks.source]
type = "cargo"
subcommand = "check"
